version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: wifi_db
    restart: always
    environment:
      POSTGRES_DB: wifi_connection
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root_password
    ports:
      - "5433:5432"
    # entrypoint: ["./mvnw", "spring-boot:run"]
    volumes:
      # Map a local folder './pgdata' to the internal postgres data path
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wifi_connection"]
      interval: 5s
      timeout: 5s
      retries: 5

  web-app:
    build: .
    container_name: wifi_backend
    restart: always
    ports:
      - "8080:8080"
    # 🌟 MOVED HERE: These belong to the application, not the database!
    working_dir: /app
    entrypoint: ["./mvnw", "spring-boot:run"]
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/wifi_connection
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=root_password
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
      - SPRING_PROFILES_ACTIVE=dev

volumes:
  pg_data: