<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CableSys - Billing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex">

    <div th:replace="~{fragments/sidebar :: sidebar('billing')}"></div>

    <div class="main-content d-flex flex-column w-100">
        <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom p-3">
            <div class="container-fluid">
                <h5 class="mb-0 fw-bold">Billing</h5>
            </div>
        </nav>
        <div class="d-flex align-items-center justify-content-between m-4">
            <nav aria-label="Page navigation" th:if="${totalPages > 0}">
                </nav>
            <div class="input-group shadow-sm" style="width: 50%;">
                <input type="text" id="billSearch" class="form-control border-0 py-2" 
                    placeholder="Search by name or address..." autocomplete="off">
            </div>
        </div>
        
        <div id="paymentLogsTableContainer">
            <div th:fragment="billingTableFragment" id="paymentLogsTableContent">
                <!-- <div class="d-flex align-items-center justify-content-between m-4"> -->
                    <div class="m-4" th:if="${totalPages > 0}">
                        <nav aria-label="Page navigation">
                            <ul class="pagination mb-0">
                                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                    <button class="page-link border-0 shadow-sm" 
                                            th:onclick="|changeBillingPage(${currentPage - 1})|"
                                            th:disabled="${currentPage == 0}">Previous</button>
                                </li>

                                <li class="page-item" th:if="${currentPage > 2}">
                                    <button class="page-link border-0 shadow-sm" th:onclick="|changeBillingPage(0)|">1</button>
                                </li>
                                <li class="page-item disabled" th:if="${currentPage > 3}">
                                    <span class="page-link border-0 bg-transparent">...</span>
                                </li>

                                <li class="page-item" 
                                    th:each="i : ${#numbers.sequence(
                                        currentPage - 2 < 0 ? 0 : currentPage - 2, 
                                        currentPage + 2 >= totalPages ? totalPages - 1 : currentPage + 2
                                    )}"
                                    th:classappend="${currentPage == i} ? 'active'"> 
                                    <button class="page-link border-0 shadow-sm" 
                                            th:onclick="|changeBillingPage(${i})|" 
                                            th:text="${i + 1}"></button>
                                </li>

                                <li class="page-item disabled" th:if="${currentPage < totalPages - 4}">
                                    <span class="page-link border-0 bg-transparent">...</span>
                                </li>
                                <li class="page-item" th:if="${currentPage < totalPages - 3}">
                                    <button class="page-link border-0 shadow-sm" 
                                            th:onclick="|changeBillingPage(${totalPages - 1})|" 
                                            th:text="${totalPages}"></button>
                                </li>

                                <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                                    <button class="page-link border-0 shadow-sm" 
                                            th:onclick="|changeBillingPage(${currentPage + 1})|"
                                            th:disabled="${currentPage + 1 >= totalPages}">Next</button>
                                </li>
                            </ul>
                        </nav>
                    </div> 
                    
                </div>
                <div class="container-fluid p-4">
                    <div class="row g-4">
                        <div class="card border-1 border-light-subtle shadow-sm m-4">
                            <div class="card-body">
                                <h5 class="card-title mb-3">Recent Billing</h5>
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle">
                                        <thead class="table-light">
                                            <tr>
                                                <th>Client</th>
                                                <th>Amount</th>
                                                <th>Date Paid</th>
                                                <th>Action</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="bill : ${paymentLogPage.content}">
                                                <td th:text="${bill.customerFullName}">Juan Dela Cruz</td>
                                                <td th:text="'₱' + ${bill.amount}"></td>
                                                <td th:text="${#temporals.format(bill.createDate, 'yyyy-MM-dd HH:mm')}">2023-10-01</td>
                                                <td>
                                                    <a th:href="@{/customer/receipt/download/{id}/{billId}(id=${bill.custId}, billId=${bill.billId})}" 
                                                        class="btn btn-sm btn-outline-primary">
                                                        Print
                                                    </a>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                    </div>
                <!-- </div> -->
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/script.js}"></script>
    <script>

    </script>
    
</body>
</html>
