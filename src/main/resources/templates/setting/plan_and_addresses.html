<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CableSys - Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex">

    <div th:replace="~{fragments/sidebar :: sidebar('settings')}"></div>

    <div class="main-content d-flex flex-column w-100">
        <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom p-3">
            <div class="container-fluid">
                <h5 class="mb-0 fw-bold">System Settings & Maintenance</h5>
            </div>
        </nav>

        <div class="container-fluid p-4">
            <div class="row g-4">
                
                <div class="col-md-6">
                    <div class="card shadow-sm border-0">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h5 class="card-title fw-bold mb-0"><i class="bi bi-wifi me-2 text-primary"></i>Internet Plans</h5>
                                <button class="btn btn-sm btn-primary px-3 shadow-sm"   data-bs-toggle="modal" 
                                                        data-bs-target="#planModal"
                                                        th:data-id="${planTag.planId}"
                                                        th:data-speed="${planTag.speed}"
                                                        th:data-price="${planTag.price}">
                                    <i class="bi bi-plus-lg me-1"></i> Add Plan
                                </button>
                            </div>
                            <div class="table-responsive">
                                <table class="table table-hover align-middle">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Speed</th>
                                            <th>Price</th>
                                            <th class="text-end">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="p : ${plans}">
                                            <td class="fw-semibold text-dark" th:text="${p.speed}"></td>
                                            <td class="text-primary fw-bold" th:text="'₱' + ${p.price}"></td>
                                            <td class="text-end">
                                                <button class="btn btn-sm btn-outline-secondary edit-plan-btn" 
                                                        data-bs-toggle="modal" 
                                                        data-bs-target="#planModal"
                                                        th:data-id="${p.planId}"
                                                        th:data-speed="${p.speed}"
                                                        th:data-price="${p.price}">
                                                    <i class="bi bi-pencil-square"></i>
                                                </button>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card shadow-sm border-0">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h5 class="card-title fw-bold mb-0"><i class="bi bi-geo-alt-fill me-2 text-danger"></i>Coverage Areas</h5>
                                <button class="btn btn-sm btn-primary px-3 shadow-sm" 
                                                    data-bs-toggle="modal" 
                                                    data-bs-target="#addressModal" 
                                                    th:data-addressId="${addressTag.addressId}"
                                                    th:data-barangay="${addressTag.barangay}"
                                                    th:data-municipality="${addressTag.municipality}"
                                                    th:data-province="${addressTag.province}">
                                    <i class="bi bi-plus-lg me-1"></i> Add Area
                                </button>
                            </div>
                            <div class="table-responsive">
                                <table class="table table-hover align-middle">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Barangay</th>
                                            <th>Municipality</th>
                                            <th>Province</th>
                                            <th class="text-end">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="area : ${addresses}">
                                            <td class="fw-semibold text-dark" th:text="${area.barangay}"></td>
                                            <td th:text="${area.municipality}"></td>
                                            <td th:text="${area.province}"></td>
                                            <td class="text-end">
                                                <button class="btn btn-sm btn-outline-secondary edit-plan-btn" 
                                                        data-bs-toggle="modal" 
                                                        data-bs-target="#addressModal"
                                                        th:data-addressId="${area.addressId}"
                                                        th:data-barangay="${area.barangay}"
                                                        th:data-municipality="${area.municipality}"
                                                        th:data-province="${area.province}">
                                                    <i class="bi bi-pencil-square"></i>
                                                </button>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="planModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold">Plan Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form action="/settings/plans/save" method="POST" th:object="${planTag}">
                    <div class="modal-body">
                        <input type="hidden" id="planId" name="planId">
                        
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Plan Speed</label>
                            <input type="text" id="speed" name="speed" class="form-control" placeholder="e.g., 50 Mbps" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label text-muted small fw-bold">Monthly Rate Price (PHP)</label>
                            <input type="number" step="0.01" id="price" name="price" class="form-control" placeholder="e.g., 1299" required>
                        </div>
                    </div>
                    <div class="modal-footer border-top-0 pt-0">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-primary px-4 shadow-sm">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addressModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold">Service Area</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form action="/settings/areas/save" method="POST" th:object="${addressTag}">
                    <div class="modal-body">
                        <input type="hidden" id="addressId" name="addressId">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Barangay Name</label>
                            <input type="text" name="barangay" id="barangay" class="form-control" placeholder="e.g., San Sebastian" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label text-muted small fw-bold">City / Municipality</label>
                            <input type="text" name="municipality" id="municipality" class="form-control" placeholder="e.g., Hagonoy" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label text-muted small fw-bold">Province</label>
                            <input type="text" name="province" id="province" class="form-control" placeholder="e.g., Bulacan" required>
                        </div>
                    </div>
                    <div class="modal-footer border-top-0 pt-0">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary px-4 shadow-sm">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const editPlanModalElement = document.getElementById('planModal');
            if (editPlanModalElement) {
                editPlanModalElement.addEventListener('show.bs.modal', function (event) {
                    const button = event.relatedTarget;
                    
                    // Pull attributes data points out of the HTML dataset parameters mapping layer
                    const planId = button.getAttribute('th:data-id') || button.getAttribute('data-id');
                    const speed = button.getAttribute('th:data-speed') || button.getAttribute('data-speed');
                    const price = button.getAttribute('th:data-price') || button.getAttribute('data-price');
                    
                    // Assign input nodes properties execution configurations safely
                    document.getElementById('planId').value = planId;
                    document.getElementById('speed').value = speed;
                    document.getElementById('price').value = price;
                });
            }
            const editAddressModalElement = document.getElementById('addressModal');
                if (editAddressModalElement) {
                editAddressModalElement.addEventListener('show.bs.modal', function (event) {
                const button = event.relatedTarget;
                
                // Pull attributes data points out of the HTML dataset parameters mapping layer
                const addressId = button.getAttribute('th:data-addressId') || button.getAttribute('data-addressId');
                const barangay = button.getAttribute('th:data-barangay') || button.getAttribute('data-barangay');
                const municipality = button.getAttribute('th:data-municipality') || button.getAttribute('data-municipality');
                const province = button.getAttribute('th:data-province') || button.getAttribute('data-province');
                
                // Assign input nodes properties execution configurations safely
                document.getElementById('addressId').value = addressId;
                document.getElementById('barangay').value = barangay;
                document.getElementById('municipality').value = municipality;
                document.getElementById('province').value = province;
            });
            }
        });
    </script>
</body>
</html>
